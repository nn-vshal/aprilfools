[build]
  publish = "dist"
  functions = "api/functions"
  command = "npm install --include=dev && npm run build"

[build.environment]
  NODE_ENV = "development"

[dev]
  command = "vite"
  targetPort = 5173
  publish = "dist"
  functions = "api/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
